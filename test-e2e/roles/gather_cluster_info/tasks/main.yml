---

- name: Probe cluster information
  kubernetes.core.k8s_cluster_info:
  register: cluster_info

# Note: It is not possible to update dictionaries, they must be replaced. This
# makes changing deeply nested items impractical.

- name: Determine if cluster is OpenShift
  ansible.builtin.set_fact:
    cluster_info: "{{ cluster_info | combine({item.k: item.v}) }}"
  with_items:
    - k: is_openshift
      v: '{{ cluster_info.apis["security.openshift.io/v1"] is defined }}'

# Probe configuration specific to OpenShift
- when: cluster_info.is_openshift
  block:
    - name: Look for restricted-v2 SCC
      kubernetes.core.k8s_info:
        api_version: security.openshift.io/v1
        kind: SecurityContextConstraints
        name: restricted-v2
      register: res_v2

    - name: Save OpenShift information
      ansible.builtin.set_fact:
        cluster_info: "{{ cluster_info | combine({item.k: item.v}) }}"
      with_items:
        - k: openshift_major
          v: '4'
        - k: openshift_minor
          v: '{{ cluster_info.version.server.kubernetes.minor | int - 13 }}'
        - k: openshift_has_scc_restricted_v2
          v: '{{ res_v2.resources | length > 0 }}'

