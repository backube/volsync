---
- hosts: localhost
  tags:
    - e2e
    - rsync_tls
    - manyfiles
    - symlinks
    - privileged
    - volumepopulator
  tasks:
    - name: Create namespace
      include_role:
        name: create_namespace

    - name: Probe cluster information
      include_role:
        name: gather_cluster_info

    - name: Enable privileged movers
      include_role:
        name: enable_privileged_mover

    # For our "app", writing to PVC - movers themselves will run privilgeed
    - name: Define podSecurityContext
      ansible.builtin.set_fact:
        podSecurityContext:
          fsGroup: 5678
          runAsGroup: 5678
          runAsNonRoot: true
          runAsUser: 1234
          seccompProfile:
            type: RuntimeDefault
      when: not cluster_info.is_openshift

    - name: Create ReplicationDestination
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: volsync.backube/v1alpha1
          kind: ReplicationDestination
          metadata:
            name: test
            namespace: "{{ namespace }}"
          spec:
            rsyncTLS:
              copyMethod: Snapshot
              capacity: 1Gi
              accessModes:
                - ReadWriteOnce

    - name: Create source PVC
      kubernetes.core.k8s:
        state: present
        definition:
          kind: PersistentVolumeClaim
          apiVersion: v1
          metadata:
            name: data-source
            namespace: "{{ namespace }}"
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi

    - name: Write data into the source PVC
      include_role:
        name: write_to_pvc
      vars:
        data: 'some-data'
        path: '/.subdir/subdir2/testfile1'
        file_count: 2
        pvc_name: 'data-source'

    - name: Write more data into the source PVC at different subdir
      include_role:
        name: write_to_pvc
      vars:
        data: 'some-more-data'
        path: '/subdir2/ttestfilehere'
        file_count: 2
        pvc_name: 'data-source'

    - name: Write more data into the source PVC
      include_role:
        name: write_to_pvc
      vars:
        data: 'even-more-data'
        path: '/.hiddenfile'
        file_count: 3
        pvc_name: 'data-source'

    - name: Write many files into the root of the source PVC
      include_role:
        name: write_to_pvc
      vars:
        data: 'data'
        path: '/datafilelongname-thisnameisverylong-anditkeepsgoing-andgoing-andgoing-maybethisisenough'
        file_count: 21000
        pvc_name: 'data-source'

    - name: Write file that has spaces in the name
      include_role:
        name: write_to_pvc
      vars:
        data: '000111'
        path: '/file with spaces.txt'
        file_count: 1
        pvc_name: 'data-source'

    - name: Write dir that has spaces in the name
      include_role:
        name: write_to_pvc
      vars:
        data: '222333444555'
        path: '/dir with spaces/subfile wspaces.txt'
        file_count: 1
        pvc_name: 'data-source'

    - name: Write file that starts with a hash char
      include_role:
        name: write_to_pvc
      vars:
        data: '000111'
        path: '/#filestartswithhash'
        file_count: 1
        pvc_name: 'data-source'

    - name: Write symlinks
      include_role:
        name: write_to_pvc
      vars:
        data: '000111'
        path: '/mysymlinktargetfile.txt'
        pvc_name: 'data-source'
        symlinks:
          # Relative symlinks
          - path: '/link-relative'
            target: 'mysymlinktargetfile.txt'
          - path: '/subdir/link-relative-parent'
            target: '../mysymlinktargetfile.txt'
          # Absolute symlinks that point outside of the PVC
          - path: '/link-absolute'
            target: '/opt/test/somefile.txt'
          - path: '/subdir/symlink-absolute-parent/another-symlink'
            target: '/tmp/testing/another-symlink-target'
          - path: '/dir with spaces/another simlink with spaces'
            target: '/tmp/testing/another symlink target with spaces'

    - name: Wait for key and address to be ready
      kubernetes.core.k8s_info:
        api_version: volsync.backube/v1alpha1
        kind: ReplicationDestination
        name: test
        namespace: "{{ namespace }}"
      register: res
      until: >
        res.resources | length > 0 and
        res.resources[0].status.rsyncTLS is defined and
        res.resources[0].status.rsyncTLS.keySecret is defined and
        res.resources[0].status.rsyncTLS.address is defined
      delay: 1
      retries: 300

    - name: Create ReplicationSource
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: volsync.backube/v1alpha1
          kind: ReplicationSource
          metadata:
            name: source
            namespace: "{{ namespace }}"
          spec:
            sourcePVC: data-source
            trigger:
              schedule: "0 0 1 1 *"
            rsyncTLS:
              keySecret: "{{ res.resources[0].status.rsyncTLS.keySecret }}"
              address: "{{ res.resources[0].status.rsyncTLS.address }}"
              copyMethod: Snapshot

    - name: Check status of replicationsource
      kubernetes.core.k8s_info:
        api_version: volsync.backube/v1alpha1
        kind: ReplicationSource
        name: source
        namespace: "{{ namespace }}"
      register: res
      until: >
        res.resources | length > 0 and
        res.resources[0].status.lastSyncDuration is defined and
        res.resources[0].status.lastSyncTime is defined and
        res.resources[0].status.latestMoverStatus is defined and
        res.resources[0].status.latestMoverStatus.result == "Successful" and
        res.resources[0].status.latestMoverStatus.logs is search("sent.*bytes.*received.*bytes.*") and
        res.resources[0].status.latestMoverStatus.logs is search("rsync completed in.*")
      delay: 1
      retries: 900

    - name: Wait for sync to complete
      kubernetes.core.k8s_info:
        api_version: volsync.backube/v1alpha1
        kind: ReplicationDestination
        name: test
        namespace: "{{ namespace }}"
      register: res
      until: >
        res.resources | length > 0 and
        res.resources[0].status.latestImage is defined and
        res.resources[0].status.latestImage.kind == "VolumeSnapshot" and
        res.resources[0].status.latestMoverStatus is defined and
        res.resources[0].status.latestMoverStatus.result == "Successful"
      delay: 1
      retries: 900

    - name: Convert latestImage to PVC using VolumePopulator
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: data-dest
            namespace: "{{ namespace }}"
          spec:
            accessModes:
              - ReadWriteOnce
            dataSourceRef:
              kind: ReplicationDestination
              apiGroup: volsync.backube
              name: test
            resources:
              requests:
                storage: 1Gi
      when: cluster_info.volumepopulator_supported

    - name: Convert latestImage to PVC
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: data-dest
            namespace: "{{ namespace }}"
          spec:
            accessModes:
              - ReadWriteOnce
            dataSource:
              kind: VolumeSnapshot
              apiGroup: snapshot.storage.k8s.io
              name: "{{ res.resources[0].status.latestImage.name }}"
            resources:
              requests:
                storage: 1Gi
      when: not cluster_info.volumepopulator_supported

    - name: Verify contents of PVC
      include_role:
        name: compare_pvc_data
      vars:
        pvc1_name: data-source
        pvc2_name: data-dest
        timeout: 900
